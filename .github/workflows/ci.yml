name: ci

env:
  CMAKE_BUILD_TYPE: Release

on:
  push:
    paths:
    - "**.py"
    - "**.cmake"
    - "**/CMakeLists.txt"
    - .github/workflows/ci.yml

jobs:

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - run: pip install .[tests,lint]

    - run: flake8
    - run: mypy

    - run: pytest

  macos:
    needs: linux
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - run: pip install .[tests]

    - run: pytest

  windows:
    needs: linux
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - run: pip install .[tests]

    - run: pytest
